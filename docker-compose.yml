version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: echo-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: echo
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - echo-net

  echo-hq:
    build: .
    container_name: echo-hq
    ports:
      - "8080:8080"
    environment:
      - ECHO_API_KEY=echo_hq_key
      - ECHO_POSTGRES_DSN=postgresql://user:pass@postgres:5432/echo
      - ECHO_WHISPER_MODEL=base
      - ECHO_TRANSCRIPTION_WORKERS=4
    volumes:
      - ./data:/app/data
      - ./assets:/app/assets
      - ./logs:/app/logs
    restart: unless-stopped
    depends_on:
      - postgres
    networks:
      - echo-net

networks:
  echo-net:
    driver: bridge

volumes:
  postgres_data:
